; ~/.config/i3/polybar/config.ini

include-file = ~/.config/i3/polybar/colors

[global/wm]
margin-top = 0
margin-bottom = 0

[bar/main]
monitor = 
bottom = true
width = 100%
height = 24
offset-x = 0
offset-y = 0
background = ${color.background}
foreground = ${color.foreground}
radius = 0.0
fixed-center = true
overline-size = 0
underline-size = 0

; Fonts - terminal style
font-0 = Ubuntu:size=7.5;1
font-1 = "Ubuntu Nerd Font Propo:size=10;2"
font-2 = Ubuntu:size=10;1

; Modules - terminal style layout
modules-left = i3
modules-center = date
modules-right = cpu memory volume bluetooth brightness battery network

; Spacing
module-margin-left = 2
module-margin-right = 6
padding-left = 0
padding-right = 6

; Borders
border-size = 0
border-color = ${color.foreground}

; Module settings
[module/i3]
type = internal/i3
format = %{T3}<label-state> <label-mode>%{T-}
index-sort = true
wrapping-scroll = false
strip-wsnumbers = true

; I3 workspace colors - terminal style
label-mode-padding = 1
label-mode-background = ${color.background}
label-mode-foreground = ${color.foreground}

label-focused = "[ %name% ]"
label-focused-background = ${color.background}
label-focused-foreground = ${color.foreground}
label-focused-padding = 1

label-unfocused = " %name% "
label-unfocused-background = ${color.background}
label-unfocused-foreground = ${color.foreground}
label-unfocused-padding = 1

label-visible = " %name% "
label-visible-background = ${color.background}
label-visible-foreground = ${color.foreground}
label-visible-padding = 1

label-urgent = "!%name%!"
label-urgent-background = ${color.background}
label-urgent-foreground = ${color.foreground}
label-urgent-padding = 1

;; _-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_

[module/date]
type = internal/date
interval = 1.0
date = "%d-%b-%Y"
time = "%H:%M"
format = <label>
label = %{T3}%date%  |  %time%%{T-}
label-foreground = ${color.foreground}

;; _-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_

[module/memory]
type = internal/memory
interval = 5
format-prefix = "󰘚  "
format-prefix-foreground = ${color.teal}
label =  %used:4%
label-foreground = ${color.teal}

;; _-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_

[module/battery]
type = internal/battery
battery = BAT0

full-at = 98

label-charging = 󱐋  %percentage%%
label-charging-foreground = ${color.altgreen}

label-discharging =  󰂁  %percentage%%
label-discharging-foreground = ${color.flamingo}

label-full = 󱟢  100%
label-full-foreground = ${color.green}

;; _-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_

[module/volume]
type = internal/pulseaudio

;format-volume-prefix-foreground = ${color.BLACK}
format-volume = <ramp-volume> <label-volume>
format-volume-foreground = ${color.blue}

label-volume = %percentage%
format-muted = <label-muted>
label-muted = 󰝟
label-muted-foreground = ${color.disabled}

; Only applies if <ramp-volume> is used
ramp-volume-0 = 󰕿
ramp-volume-1 = 󰖀
ramp-volume-2 = 󰕾

; Right click
click-right = pavucontrol

;; _-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_

[module/bluetooth]
type = custom/text
; The icon to display in the bar 
content = " "
content-foreground = ${color.blue}

; The command to run when you click the icon
; -l specifies launcher, e.g. rofi, dmenu, fuzzel, etc.
; The two lines below work in Arch
;click-right = bzmenu -l custom --launcher-command "rofi -theme $HOME/.config/i3/rofi/bluetooth.rasi -dmenu"
;click-left = bzmenu -l custom --launcher-command "rofi -theme $HOME/.config/i3/rofi/bluetooth.rasi -dmenu"

click-left = /home/david/.local/bin/bzmenu -l custom --launcher-command "rofi -theme $HOME/.config/i3/rofi/bluetooth.rasi -dmenu"
click-right = /home/david/.local/bin/bzmenu -l custom --launcher-command "rofi -theme $HOME/.config/i3/rofi/bluetooth.rasi -dmenu"

;; _-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_

[module/brightness]
type = custom/script
exec = ~/.config/i3/scripts/brightnessctl.sh
format = <label>

scroll-up = exec brightnessctl set +5%
scroll-down = exec brightnessctl set 5%-
interval = 0.5

label = %output%
label-foreground = ${color.altyellow}

;; _-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_

[module/network]
type = custom/script
exec = echo ""
interval = 3.0
format-foreground = ${color.subtext}

; Click actions now work perfectly
click-left = nm-connection-editor
click-right = ~/.config/i3/scripts/network.sh

;; _-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_

[settings]
screenchange-reload = true
;pseudo-transparency = true
